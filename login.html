<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — J1 Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #B01A18; --accent-dk: #8c1412;
      --bg: #F3F4F6; --card: #fff;
      --border: #E5E7EB; --text: #1A1A1A; --muted: #6B7280;
    }
    body {
      font-family: 'Inter', sans-serif; background: var(--bg);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .wrap { width: 100%; max-width: 400px; padding: 16px; }
    .card {
      background: var(--card); border-radius: 16px; padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    }
    .logo {
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--accent); display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 1.1rem; font-style: italic;
      margin-bottom: 20px;
    }
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
    .sub { color: var(--muted); font-size: 0.88rem; margin-bottom: 28px; }
    .error {
      display: none; background: #fee2e2; color: #991b1b;
      border-radius: 8px; padding: 10px 14px; font-size: 0.85rem;
      margin-bottom: 16px; align-items: center; gap: 8px;
    }
    .error.show { display: flex; }
    label { display: block; font-size: 0.83rem; font-weight: 500; margin-bottom: 6px; color: var(--text); }
    input {
      width: 100%; padding: 10px 14px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 0.93rem; font-family: inherit;
      outline: none; margin-bottom: 16px; transition: border-color 0.2s;
      background: var(--card); color: var(--text);
    }
    input:focus { border-color: var(--accent); }
    .btn {
      width: 100%; padding: 12px; background: var(--accent); color: #fff;
      border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: background 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:hover:not(:disabled) { background: var(--accent-dk); }
    .btn:disabled { opacity: 0.7; cursor: not-allowed; }
    .spinner {
      width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer { text-align: center; margin-top: 24px; font-size: 0.78rem; color: var(--muted); line-height: 1.6; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="logo">J1</div>
      <h1>Welcome back</h1>
      <p class="sub">Sign in to the J1 Participant Dashboard</p>

      <div class="error" id="err">
        <span>⚠</span><span id="errText">Invalid username or password.</span>
      </div>

      <form id="form" novalidate>
        <label for="u">Username</label>
        <input type="text" id="u" placeholder="Enter your username" autocomplete="username" required>

        <label for="p">Password</label>
        <input type="password" id="p" placeholder="••••••••" autocomplete="current-password" required>

        <button type="submit" class="btn" id="btn">Sign In</button>
      </form>

      <p class="footer">Authorised personnel only.<br>Unauthorised access is prohibited.</p>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>
    // Already logged in → go to dashboard
    if (Auth.getSession()) window.location.replace('index.html');

    const form   = document.getElementById('form');
    const btn    = document.getElementById('btn');
    const err    = document.getElementById('err');
    const errTxt = document.getElementById('errText');

    function showErr(msg) { errTxt.textContent = msg; err.classList.add('show'); }
    function hideErr()    { err.classList.remove('show'); }

    form.addEventListener('submit', async e => {
      e.preventDefault(); hideErr();
      const u = document.getElementById('u').value.trim();
      const p = document.getElementById('p').value;
      if (!u || !p) { showErr('Please enter both username and password.'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Signing in…';

      try {
        const role = await Auth.login(u, p);
        if (role) {
          window.location.replace('index.html');
        } else {
          showErr('Invalid username or password. Please try again.');
          btn.disabled = false; btn.textContent = 'Sign In';
          document.getElementById('p').value = '';
          document.getElementById('p').focus();
        }
      } catch {
        showErr('Something went wrong. Please refresh and try again.');
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    });

    ['u', 'p'].forEach(id => document.getElementById(id).addEventListener('input', hideErr));
  </script>
</body>
</html>
