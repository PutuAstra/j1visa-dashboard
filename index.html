<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J1 Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2/dist/chartjs-plugin-datalabels.min.js"></script>
  <link rel="stylesheet" href="style.css">
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="zoho.js"></script>
</head>
<body>
  <!-- Auth guard -->
  <script>if (!Auth.requireAuth()) document.body.innerHTML = '';</script>
  <!-- Capture Zoho OAuth token if redirected back from Zoho -->
  <script>ZohoAuth.handleCallback();</script>

  <div class="app-shell">

    <!-- Sidebar overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">J1</div>
        <div class="sidebar-brand">
          <div class="sidebar-brand-name" id="appName"></div>
          <div class="sidebar-brand-org" id="orgName"></div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-label">PROGRAM</div>
        <a href="#" class="nav-link" data-page="overview">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Overview
        </a>
        <a href="#" class="nav-link" data-page="participants">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M5.5 21a8.38 8.38 0 0 1 13 0"/></svg>
          Participants
        </a>
        <a href="#" class="nav-link" data-page="visa">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
          Visa / DS-2019
        </a>
        <a href="#" class="nav-link" data-page="travel">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.79 19.79 0 0 1 11.39 18a19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          Travel
        </a>
      </nav>

      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebarAvatar"></div>
        <div class="sidebar-user-info">
          <div class="sidebar-username" id="sidebarUsername"></div>
          <div class="sidebar-role" id="sidebarRole"></div>
        </div>
        <button class="sidebar-logout" id="logoutBtn" title="Sign out">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </aside>

    <!-- ── MAIN AREA ── -->
    <div class="main-wrapper">

      <header class="topbar">
        <!-- Mobile hamburger -->
        <button class="hamburger" id="hamburger" aria-label="Open menu">
          <span></span><span></span><span></span>
        </button>

        <div class="topbar-title" id="topbarTitle">Overview</div>

        <div class="topbar-right">
          <!-- Zoho connect status -->
          <div class="zoho-status" id="zohoStatus"></div>
          <!-- Theme toggle -->
          <button class="icon-btn" id="themeBtn" title="Toggle dark mode">
            <svg id="themeIcon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          </button>
          <div class="topbar-avatar" id="topbarAvatar"></div>
        </div>
      </header>

      <main class="main-content" id="main-content">
        <!-- Pages render here -->
      </main>

      <footer class="main-footer">
        <span id="footerOrg"></span> · J1 Participant Dashboard
      </footer>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="app.js"></script>
  <script>
    // Populate user info from session
    const sess = Auth.getSession();
    if (sess) {
      const name = sess.user.charAt(0).toUpperCase() + sess.user.slice(1);
      const ini  = name.charAt(0).toUpperCase();
      const role = sess.role === 'admin' ? 'Administrator' : 'Staff';
      document.getElementById('sidebarUsername').textContent = name;
      document.getElementById('sidebarRole').textContent     = role;
      document.getElementById('sidebarAvatar').textContent   = ini;
      document.getElementById('topbarAvatar').textContent    = ini;
    }
    document.getElementById('appName').textContent  = CONFIG.APP_NAME;
    document.getElementById('orgName').textContent  = CONFIG.ORG_NAME;
    document.getElementById('footerOrg').textContent = CONFIG.ORG_NAME;

    document.getElementById('logoutBtn').addEventListener('click', () => Auth.logout());

    // Hamburger (mobile)
    const hamburger = document.getElementById('hamburger');
    const sidebar   = document.getElementById('sidebar');
    const overlay   = document.getElementById('sidebarOverlay');
    hamburger.addEventListener('click', () => { sidebar.classList.toggle('open'); overlay.classList.toggle('show'); });
    overlay.addEventListener('click',   () => { sidebar.classList.remove('open'); overlay.classList.remove('show'); });

    // Theme toggle
    document.getElementById('themeBtn').addEventListener('click', () => {
      const html = document.documentElement;
      html.dataset.theme = html.dataset.theme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('j1_theme', html.dataset.theme);
    });
    // Restore saved theme
    const savedTheme = localStorage.getItem('j1_theme');
    if (savedTheme) document.documentElement.dataset.theme = savedTheme;

    // Boot the SPA
    App.init();
  </script>
</body>
</html>
